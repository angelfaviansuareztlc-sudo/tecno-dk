<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tecno DK</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin: 0;
    background-color: #0f172a;
    color: white;
    text-align: center;
}

header{
    background-color: #000000;
    padding: 20px;
    font-size: 30px;
    font-weight: bold;
}

/* GRID 2 ARRIBA Y 2 ABAJO */
.container{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 40px;
    justify-items: center;
}

.card{
    background-color: #1e293b;
    padding: 15px;
    border-radius: 10px;
    width: 250px;
}

.card img{
    width: 100%;
    border-radius: 10px;
}

.precio{
    color: #38bdf8;
    font-size: 20px;
}

button{
    background-color: #25D366;
    border: none;
    padding: 10px;
    color: white;
    border-radius: 5px;
    cursor: pointer;
    margin-top: 10px;
}

.excel{
    background-color: #2563eb;
    margin-top: 20px;
}
</style>
</head>

<body>

<header> Tecno DK </header>

<div class="container">

    <!-- PRODUCTO 1 -->
    <div class="card">
        <img src="computadora.png" alt="computadora">
        <h3>Computadora Gamer</h3>
        <p class="precio">$15000 MXN</p>
        <button onclick="comprar('Computadora Gamer',15000)">Comprar</button>

        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://wa.me/525552744805?text=Hola%20quiero%20comprar%20Computadora%20Gamer%20%2415000" alt="QR">
    </div>

    <!-- PRODUCTO 2 -->
    <div class="card">
        <img src="audifonos blutu.png" alt="audifonos">
        <h3>Audífonos Bluetooth</h3>
        <p class="precio">$800 MXN</p>
        <button onclick="comprar('Audífonos Bluetooth',800)">Comprar</button>

     <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://wa.me/525552744805?text=Hola%20quiero%20comprar%20Audifonos%20Bluetooth%20%24800" alt="QR">
    </div>

    <!-- PRODUCTO 3 -->
    <div class="card">
        <img src="Smartphone.png" alt="Smartphone">
        <h3>Smartphone</h3>
        <p class="precio">$9500 MXN</p>
        <button onclick="comprar('Smartphone',9500)">Comprar</button>

        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://wa.me/525552744805?text=Hola%20quiero%20comprar%20Smartphone%20%249500" alt="QR">
    </div>

    <!-- PRODUCTO 4 -->
    <div class="card">
        <img src="tablet.png" alt="tablet">
        <h3>Tablet</h3>
        <p class="precio">$5000 MXN</p>
        <button onclick="comprar('Tablet',5000)">Comprar</button>

        <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://wa.me/525552744805?text=Hola%20quiero%20comprar%20Tablet%20%245000" alt="QR">
    </div>

</div>

<button class="excel" onclick="descargarExcel()">Descargar ventas (Excel)</button>

<script>
// BASE DE DATOS
let ventas = JSON.parse(localStorage.getItem("ventas")) || [];

// FUNCIÓN COMPRAR
function comprar(producto, precio){

    let telefono = "525552744805"; // SIN + y sin espacios

    let mensaje = `Hola, quiero comprar: ${producto} - Precio: $${precio} MXN`;

    let url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;

    let venta = {
        producto: producto,
        precio: precio,
        fecha: new Date().toLocaleString()
    };

    ventas.push(venta);
    localStorage.setItem("ventas", JSON.stringify(ventas));

    window.open(url, "_blank");
}

// DESCARGAR EXCEL
function descargarExcel(){
    let contenido = "Producto,Precio,Fecha\n";

    ventas.forEach(v => {
        contenido += `${v.producto},${v.precio},${v.fecha}\n`;
    });

    let blob = new Blob([contenido], { type: "text/csv" });
    let enlace = document.createElement("a");

    enlace.href = URL.createObjectURL(blob);
    enlace.download = "ventas_tecnoDK.csv";
    enlace.click();
}
</script>

</body>
</html>
